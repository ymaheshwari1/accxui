on:
  workflow_call:
    inputs:
      config-path:
        required: true
        type: string
      app: # The name of the app to clone into apps/, org/repo
        required: true
        type: string
      appDir:
        required: true
        type: string
      firebaseProject:
        default: 'default'
        type: string
      versionsEndpoint:
        default: ''
        type: string
      versionsEndpointAuthHeader:
        default: 'Authorization'
        type: string
      versionsEndpointAuthScheme:
        default: 'Bearer'
        type: string
    secrets:
      envPAT:
        required: true
      HOTWAX_PUBLIC_SECRET:
        required: true
      VITE_FIREBASE_CONFIG:
        required: false
      VITE_FIREBASE_VAPID_KEY:
        required: false
      VERSIONS_ENDPOINT_TOKEN:
        required: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout accxui
        uses: actions/checkout@v4
        with:
          repository: hotwax/accxui
          path: .

      - name: Checkout app in apps/
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.app }}
          path: apps/${{ inputs.appDir }} 
          token: ${{ secrets.envPAT }}
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Use Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Fetch deployment versions
        if: ${{ inputs.versionsEndpoint != '' }}
        run: |
          if [[ -n "$VERSIONS_ENDPOINT_TOKEN" ]]; then
            if [[ -n "${{ inputs.versionsEndpointAuthScheme }}" ]]; then
              AUTH_VALUE="${{ inputs.versionsEndpointAuthScheme }} $VERSIONS_ENDPOINT_TOKEN"
            else
              AUTH_VALUE="$VERSIONS_ENDPOINT_TOKEN"
            fi
            curl -fsSL -H "${{ inputs.versionsEndpointAuthHeader }}: $AUTH_VALUE" "${{ inputs.versionsEndpoint }}" -o "$RUNNER_TEMP/app-versions.json"
          else
            curl -fsSL "${{ inputs.versionsEndpoint }}" -o "$RUNNER_TEMP/app-versions.json"
          fi

          node .github/scripts/normalize-version-builds.mjs "$RUNNER_TEMP/app-versions.json" "$RUNNER_TEMP/version-builds.json"
          node -e "const versions=require(process.argv[1]); for (const item of versions) console.log([item.build,item.ref,item.version].join('\t'))" "$RUNNER_TEMP/version-builds.json" > "$RUNNER_TEMP/version-builds.tsv"
        env:
          VERSIONS_ENDPOINT_TOKEN: ${{ secrets.VERSIONS_ENDPOINT_TOKEN }}

      - name: Install Dependencies
        if: ${{ inputs.versionsEndpoint == '' }}
        run: pnpm install

      - name: Generate .env file
        if: ${{ inputs.versionsEndpoint == '' }}
        run: cp .env.example .env
        working-directory: apps/${{ inputs.appDir }}

      - name: Set Firebase and VAPID Config
        if: ${{ inputs.versionsEndpoint == '' }}
        run: |
          if [[ -n "$VITE_FIREBASE_CONFIG" ]]; then
            sed -i "s|^VITE_FIREBASE_CONFIG=.*|VITE_FIREBASE_CONFIG=$VITE_FIREBASE_CONFIG|g" .env
            sed -i "s|^VITE_FIREBASE_VAPID_KEY=.*|VITE_FIREBASE_VAPID_KEY='$VITE_FIREBASE_VAPID_KEY'|g" .env
            sed -i "s|const firebaseConfig =.*|const firebaseConfig = $VITE_FIREBASE_CONFIG|g" public/firebase-messaging-sw.js
          fi
        env:
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
        working-directory: apps/${{ inputs.appDir }}

      - name: Build
        if: ${{ inputs.versionsEndpoint == '' }}
        run: pnpm --filter ${{ inputs.appDir }} build

      - name: Build requested versions
        if: ${{ inputs.versionsEndpoint != '' }}
        run: |
          APP_DIR="apps/${{ inputs.appDir }}"
          cp "$APP_DIR/firebase.json" "$RUNNER_TEMP/firebase.base.json"
          rm -rf "$APP_DIR/dist"
          git -C "$APP_DIR" fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'

          while IFS=$'\t' read -r BUILD_PATH GIT_REF VERSION; do
            echo "Building $VERSION from $GIT_REF into dist/$BUILD_PATH"

            git -C "$APP_DIR" checkout --force "$GIT_REF" \
              || git -C "$APP_DIR" checkout --force "refs/tags/$GIT_REF" \
              || git -C "$APP_DIR" checkout --force "origin/$GIT_REF"

            pnpm install

            cp "$APP_DIR/.env.example" "$APP_DIR/.env"
            if [[ -n "$VITE_FIREBASE_CONFIG" ]]; then
              sed -i "s|^VITE_FIREBASE_CONFIG=.*|VITE_FIREBASE_CONFIG=$VITE_FIREBASE_CONFIG|g" "$APP_DIR/.env"
              sed -i "s|^VITE_FIREBASE_VAPID_KEY=.*|VITE_FIREBASE_VAPID_KEY='$VITE_FIREBASE_VAPID_KEY'|g" "$APP_DIR/.env"
              sed -i "s|const firebaseConfig =.*|const firebaseConfig = $VITE_FIREBASE_CONFIG|g" "$APP_DIR/public/firebase-messaging-sw.js"
            fi

            VITE_APP_BUILD="$BUILD_PATH" pnpm --filter ${{ inputs.appDir }} build
          done < "$RUNNER_TEMP/version-builds.tsv"

          cp "$RUNNER_TEMP/firebase.base.json" "$APP_DIR/firebase.json"
          node .github/scripts/generate-firebase-rewrites.mjs "$APP_DIR/firebase.json" "$RUNNER_TEMP/version-builds.json"
        env:
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      - name: Firebase Install and Deploy
        run: |
          npm install -g firebase-tools
          firebase use ${{ inputs.firebaseProject }} --token "$HOTWAX_PUBLIC_SECRET"
          firebase deploy --token "$HOTWAX_PUBLIC_SECRET" -m "Deploying via GitHub actions"  --only hosting:dev
        env:
            HOTWAX_PUBLIC_SECRET: ${{ secrets.HOTWAX_PUBLIC_SECRET }}
        working-directory: apps/${{ inputs.appDir }}
